<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Checkout Process (Step <span id="current-step-display">1</span> of 4)</h1>
        
        <!-- Step Indicators - Visual progress bar (Step 2 of 4) -->
        <div class="step-indicator">
            <div class="step active" data-step="1">1</div>
            <div class="step" data-step="2">2</div>
            <div class="step" data-step="3">3</div>
            <div class="step" data-step="4">4</div>
        </div>

        <!-- Step 1: Cart -->
        <div id="step-1" class="step-content active">
            <h2>Step 1: Cart</h2>
            <p>Review your shopping cart items.</p>
            <input type="text" id="cart-items" placeholder="Cart items (e.g., Laptop, Mouse)">
        </div>

        <!-- Step 2: Address -->
        <div id="step-2" class="step-content">
            <h2>Step 2: Shipping Address</h2>
            <input type="text" id="shipping-name" placeholder="Full Name">
            <input type="text" id="shipping-address" placeholder="Street Address">
        </div>

        <!-- Step 3: Payment -->
        <div id="step-3" class="step-content">
            <h2>Step 3: Payment</h2>
            <input type="text" id="card-number" placeholder="Card Number">
            <input type="text" id="expiry" placeholder="Expiry (MM/YY)">
        </div>

        <!-- Step 4: Confirmation -->
        <div id="step-4" class="step-content">
            <h2>Step 4: Confirmation</h2>
            <p>Review your order and confirm purchase.</p>
            <button class="submit-btn" onclick="submitWorkflow()">Complete Purchase</button>
             </div>

        <!-- Navigation Controls -->
        <div class="buttons">
            <button id="prev-btn" class="prev-btn" onclick="prevStep()">Previous</button>
           <button id="next-btn" class="next-btn" onclick="nextStep()">Next</button>
            <button class="reset-btn" onclick="resetWorkflow()">Reset Workflow</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
